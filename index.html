<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Moura | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4; 
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Nome fixado no topo à esquerda - Sem quebras estranhas */
        .header-container {
            position: absolute;
            top: 60px;
            left: 6%;
            z-index: 10;
        }

        .typing-container {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -3px;
            text-transform: uppercase;
            display: block;
        }

        .line {
            display: block; /* Garante a quebra de linha correta */
            min-height: 1.2em;
            background: linear-gradient(
                180deg, 
                #000000 0%, 
                #333333 46%, 
                #999999 50%, 
                #222222 54%, 
                #000000 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Cursor ajustado para não empurrar o texto */
        .active-cursor {
            border-right: 6px solid #333;
            margin-left: 5px;
            display: inline-block;
            vertical-align: bottom;
            height: 0.9em;
        }

        .cursor-blink {
            animation: blink 0.8s infinite;
        }

        /* Seção de Linguagens - Centralizada no meio exato */
        .languages-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .languages-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .languages-grid {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-end;
        }

        .lang-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 80px;
        }

        .lang-item img {
            height: 55px;
            width: auto;
            max-width: 65px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .lang-item img:hover {
            transform: scale(1.15);
        }

        .lang-item span {
            font-size: 0.75rem;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="typing-container">
            <div>
                <span id="line1" class="line"></span><span id="cursor1" class="active-cursor"></span>
            </div>
            <div>
                <span id="line2" class="line"></span><span id="cursor2"></span>
            </div>
        </div>
    </div>

    <div id="languages" class="languages-section">
        <div class="languages-grid">
            <div class="lang-item">
                <img src="Kotlin-logo.png" alt="Kotlin">
                <span>Kotlin</span>
            </div>
            <div class="lang-item">
                <img src="css3-logo.png" alt="CSS3">
                <span>CSS3</span>
            </div>
            <div class="lang-item">
                <img src="html-logo.png" alt="HTML5">
                <span>HTML5</span>
            </div>
            <div class="lang-item">
                <img src="javascript-logo.png" alt="JavaScript">
                <span>JavaScript</span>
            </div>
            <div class="lang-item">
                <img src="python-logo.png" alt="Python">
                <span>Python</span>
            </div>
        </div>
    </div>

    <script>
        const firstName = "GABRIEL";
        const lastName = "MOURA";
        
        const el1 = document.getElementById("line1");
        const el2 = document.getElementById("line2");
        const cursor1 = document.getElementById("cursor1");
        const cursor2 = document.getElementById("cursor2");
        const langSection = document.getElementById("languages");

        let i = 0;
        let j = 0;

        function typeFirstName() {
            if (i < firstName.length) {
                el1.innerHTML += firstName.charAt(i);
                i++;
                setTimeout(typeFirstName, 100);
            } else {
                // Remove cursor da linha 1 e passa para a 2
                cursor1.style.display = "none";
                cursor2.className = "active-cursor";
                setTimeout(typeLastName, 200);
            }
        }

        function typeLastName() {
            if (j < lastName.length) {
                el2.innerHTML += lastName.charAt(j);
                j++;
                setTimeout(typeLastName, 120);
            } else {
                // Finaliza com o cursor piscando apenas no final de MOURA
                cursor2.classList.add("cursor-blink");
                langSection.classList.add("visible");
            }
        }

        window.onload = () => {
            setTimeout(typeFirstName, 500);
        };
    </script>
</body>
</html>
