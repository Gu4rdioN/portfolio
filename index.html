<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Moura | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4; 
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Container do Nome (Topo Esquerda) */
        .container {
            padding-top: 60px;
            padding-left: 6%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .typing-container {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -4px;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .line {
            display: inline-block;
            background: linear-gradient(
                180deg, 
                #000000 0%, 
                #333333 46%, 
                #999999 50%, 
                #222222 54%, 
                #000000 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-height: 1.1em;
            padding-right: 10px;
        }

        .active-cursor {
            border-right: 8px solid #333;
        }

        .cursor-blink {
            animation: blink 0.8s infinite;
        }

        /* Bloco da UNIP e Curso */
        .academic-box {
            margin-top: 20px;
            opacity: 0;
            transition: opacity 1s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .unip-logo {
            height: 40px; /* Tamanho discreto para o logo da faculdade */
            width: auto;
            object-fit: contain;
            align-self: flex-start;
        }

        .academic-info {
            font-size: 0.85rem;
            color: #555;
            font-weight: 600;
            letter-spacing: 1px;
            border-left: 2px solid #333;
            padding-left: 10px;
            line-height: 1.4;
        }

        /* Linguagens (Centralizadas no Meio) */
        .languages-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease-out;
        }

        .languages-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .languages-grid {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-end;
        }

        .lang-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 80px;
        }

        .lang-item img {
            height: 50px;
            width: auto;
            max-width: 65px;
            object-fit: contain;
        }

        .lang-item span {
            font-size: 0.7rem;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="typing-container">
            <span id="line1" class="line active-cursor"></span>
            <span id="line2" class="line"></span>
        </div>

        <div id="academic-box" class="academic-box">
            <img src="unip-logo.png" alt="UNIP" class="unip-logo">
            <div class="academic-info">
                <p>CIÊNCIA DA COMPUTAÇÃO</p>
                <p style="font-weight: 400; color: #888;">UNIVERSIDADE PAULISTA - CAMPUS LIMEIRA</p>
            </div>
        </div>
    </div>

    <div id="languages" class="languages-section">
        <div class="languages-grid">
            <div class="lang-item">
                <img src="Kotlin-logo.png" alt="Kotlin">
                <span>Kotlin</span>
            </div>
            <div class="lang-item">
                <img src="css3-logo.png" alt="CSS3">
                <span>CSS3</span>
            </div>
            <div class="lang-item">
                <img src="html-logo.png" alt="HTML5">
                <span>HTML5</span>
            </div>
            <div class="lang-item">
                <img src="javascript-logo.png" alt="JavaScript">
                <span>JavaScript</span>
            </div>
            <div class="lang-item">
                <img src="python-logo.png" alt="Python">
                <span>Python</span>
            </div>
        </div>
    </div>

    <script>
        const firstName = "GABRIEL";
        const lastName = "MOURA";
        
        const el1 = document.getElementById("line1");
        const el2 = document.getElementById("line2");
        const academicBox = document.getElementById("academic-box");
        const langSection = document.getElementById("languages");

        let i = 0;
        let j = 0;

        function typeFirstName() {
            if (i < firstName.length) {
                el1.innerHTML += firstName.charAt(i);
                i++;
                setTimeout(typeFirstName, 100);
            } else {
                el1.classList.remove("active-cursor");
                el2.classList.add("active-cursor");
                setTimeout(typeLastName, 200);
            }
        }

        function typeLastName() {
            if (j < lastName.length) {
                el2.innerHTML += lastName.charAt(j);
                j++;
                setTimeout(typeLastName, 120);
            } else {
                el2.classList.add("cursor-blink");
                // Libera as infos e linguagens após terminar o nome
                academicBox.style.opacity = "1";
                langSection.classList.add("visible");
            }
        }

        window.onload = () => {
            setTimeout(typeFirstName, 500);
        };
    </script>
</body>
</html>
