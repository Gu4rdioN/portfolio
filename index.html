<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Moura | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4; 
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .container {
            padding-top: 60px;
            padding-left: 6%;
        }

        .typing-container {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -4px;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .line {
            display: inline-block;
            background: linear-gradient(
                180deg, 
                #000000 0%, 
                #333333 46%, 
                #999999 50%, 
                #222222 54%, 
                #000000 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-height: 1.1em;
            padding-right: 10px;
        }


        .active-cursor {
            border-right: 8px solid #333;
        }


        .cursor-blink {
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="typing-container">
            <span id="line1" class="line active-cursor"></span>
            <span id="line2" class="line"></span>
        </div>
    </div>

    <script>
        const firstName = "GABRIEL";
        const lastName = "MOURA";
        
        const el1 = document.getElementById("line1");
        const el2 = document.getElementById("line2");

        let i = 0;
        let j = 0;

        function typeFirstName() {
            if (i < firstName.length) {
                el1.innerHTML += firstName.charAt(i);
                i++;
                setTimeout(typeFirstName, 100);
            } else {

                el1.classList.remove("active-cursor");
                el2.classList.add("active-cursor");
                setTimeout(typeLastName, 200);
            }
        }

        function typeLastName() {
            if (j < lastName.length) {
                el2.innerHTML += lastName.charAt(j);
                j++;
                setTimeout(typeLastName, 120);
            } else {

                el2.classList.add("cursor-blink");
            }
        }

        window.onload = () => {
            setTimeout(typeFirstName, 500);
        };
    </script>
</body>
</html>
