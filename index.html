<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Moura | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4; 
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .container {
            padding-top: 60px;
            padding-left: 6%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Estilo do Texto */
        .name-wrapper {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -4px;
            text-transform: uppercase;
            display: inline-block;
            background: linear-gradient(
                180deg, 
                #000000 0%, 
                #333333 46%, 
                #999999 50%, 
                #222222 54%, 
                #000000 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* O Cursor agora é um elemento separado e flutuante */
        #custom-cursor {
            display: inline-block;
            width: 8px;
            height: 0.8em;
            background-color: #333;
            vertical-align: middle;
            margin-left: 5px;
        }

        .cursor-blink {
            animation: blink 0.8s infinite;
        }

        /* LINGUAGENS NO MEIO DO SITE */
        .languages-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .languages-section.visible {
            opacity: 1;
        }

        .languages-grid {
            display: flex;
            gap: 40px;
            align-items: flex-end;
        }

        .lang-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .lang-item img {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        .lang-item span {
            font-size: 0.7rem;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="name-wrapper">
            <span id="typing-text"></span><span id="custom-cursor"></span>
        </h1>
    </div>

    <div id="languages" class="languages-section">
        <div class="languages-grid">
            <div class="lang-item"><img src="Kotlin-logo.png" alt="Kotlin"><span>Kotlin</span></div>
            <div class="lang-item"><img src="css3-logo.png" alt="CSS3"><span>CSS3</span></div>
            <div class="lang-item"><img src="html-logo.png" alt="HTML5"><span>HTML5</span></div>
            <div class="lang-item"><img src="javascript-logo.png" alt="JavaScript"><span>JavaScript</span></div>
            <div class="lang-item"><img src="python-logo.png" alt="Python"><span>Python</span></div>
        </div>
    </div>

    <script>
        const nameArray = ["G", "A", "B", "R", "I", "E", "L", "<br>", "M", "O", "U", "R", "A"];
        const textElement = document.getElementById("typing-text");
        const cursor = document.getElementById("custom-cursor");
        const langSection = document.getElementById("languages");
        let i = 0;

        function typeWriter() {
            if (i < nameArray.length) {
                textElement.innerHTML += nameArray[i];
                i++;
                setTimeout(typeWriter, 120); 
            } else {
                // Ativa o piscar apenas no final de tudo
                cursor.classList.add("cursor-blink");
                langSection.classList.add("visible");
            }
        }

        window.onload = () => {
            setTimeout(typeWriter, 500);
        };
    </script>
</body>
</html>
